<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="چهار برگ">
<title>🃏 چهار برگ</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Tahoma,Arial,sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
  .app{max-width:480px;margin:0 auto;padding:1rem;padding-bottom:2rem}
  h1{font-size:22px;font-weight:600;text-align:center;padding:1rem 0 0.25rem}
  .subtitle{text-align:center;font-size:13px;color:#666;margin-bottom:1.25rem}
  .tab-bar{display:flex;border:1px solid #ddd;border-radius:10px;overflow:hidden;margin-bottom:1.25rem;background:#eee}
  .tab{flex:1;padding:10px;text-align:center;font-size:13px;cursor:pointer;background:transparent;color:#666;border:none;font-family:Tahoma,Arial,sans-serif}
  .tab.active{background:#fff;color:#1a1a1a;font-weight:600;border-radius:9px;margin:3px}
  .teams{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem}
  .team-card{background:#fff;border:1px solid #e0e0e0;border-radius:14px;padding:1rem;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
  .team-card.winner{border:2px solid #1D9E75;background:#f0faf6}
  .team-name-input{background:transparent;border:none;border-bottom:1px solid #ccc;text-align:center;font-size:15px;font-weight:600;color:#1a1a1a;width:100%;padding:2px 4px;outline:none;font-family:Tahoma,Arial,sans-serif;margin-bottom:10px}
  .total{font-size:52px;font-weight:700;color:#1a1a1a;line-height:1}
  .total-label{font-size:11px;color:#888;margin-top:4px;margin-bottom:14px}
  .inp-row{display:flex;align-items:center;justify-content:center;gap:6px}
  .inp-row button{width:34px;height:34px;border:1px solid #ddd;border-radius:8px;background:#f5f5f5;color:#1a1a1a;font-size:20px;cursor:pointer;font-family:Tahoma,Arial,sans-serif;line-height:1}
  .inp-row button:active{background:#e0e0e0;transform:scale(0.95)}
  .set-inp{width:60px;text-align:center;font-size:16px;border:1px solid #ddd;border-radius:8px;padding:5px 2px;background:#fff;color:#1a1a1a;font-family:Tahoma,Arial,sans-serif}
  .winner-badge{display:inline-block;background:#E1F5EE;color:#0F6E56;font-size:11px;padding:3px 10px;border-radius:20px;margin-top:10px;font-weight:600}
  .winner-msg{text-align:center;padding:12px 16px;background:#E1F5EE;border-radius:12px;color:#0F6E56;font-size:15px;font-weight:600;margin-bottom:1rem;border:1px solid #9FE1CB}
  .save-btn{width:100%;padding:12px;border:1px solid #1D9E75;border-radius:10px;background:#E1F5EE;color:#0F6E56;font-size:14px;cursor:pointer;margin-bottom:8px;font-family:Tahoma,Arial,sans-serif;font-weight:600}
  .save-btn:active{transform:scale(0.98)}
  .add-btn{width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;background:#f5f5f5;color:#1a1a1a;font-size:14px;cursor:pointer;margin-bottom:8px;font-family:Tahoma,Arial,sans-serif;font-weight:500}
  .add-btn:active{transform:scale(0.98)}
  .add-btn:disabled{opacity:0.35;cursor:not-allowed}
  .controls{display:flex;gap:8px;margin-bottom:1.25rem}
  .ctrl-btn{flex:1;padding:9px;border:1px solid #ddd;border-radius:10px;background:#f5f5f5;color:#1a1a1a;font-size:13px;cursor:pointer;font-family:Tahoma,Arial,sans-serif}
  .ctrl-btn.danger{color:#A32D2D;border-color:#f09595;background:#fff5f5}
  .ctrl-btn:active{transform:scale(0.97)}
  .confirm-box{background:#fff;border:1px solid #ddd;border-radius:12px;padding:1rem;text-align:center;margin-bottom:1rem;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
  .confirm-box p{font-size:13px;color:#1a1a1a;margin-bottom:12px}
  .confirm-btns{display:flex;gap:8px;justify-content:center}
  .confirm-btns button{padding:7px 20px;border:1px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer;font-family:Tahoma,Arial,sans-serif;background:#fff;color:#1a1a1a}
  .confirm-btns .yes{color:#A32D2D;border-color:#f09595;background:#fff5f5}
  .sec-title{font-size:13px;color:#888;margin-bottom:6px}
  .round-row{display:grid;grid-template-columns:44px 1fr 1fr;gap:6px;padding:7px 4px;border-bottom:1px solid #f0f0f0;font-size:13px;text-align:center;color:#1a1a1a}
  .rn{font-size:11px;color:#888;text-align:right;padding-top:1px}
  .rounds-header{font-size:11px;font-weight:600;color:#888;background:#fafafa}
  .running{font-size:11px;color:#888}
  .game-card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1rem;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
  .game-card-title{font-size:12px;color:#888;margin-bottom:8px}
  .game-card-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
  .game-card-title-row .game-card-title{margin-bottom:0}
  .del-btn{display:flex;align-items:center;justify-content:center;width:26px;height:26px;flex-shrink:0;background:#f5f5f5;border:1px solid #e5e5e5;color:#999;cursor:pointer;padding:0;border-radius:8px;transition:background .15s,color .15s}
  .del-btn:hover{background:#fff0f0;color:#c0392b;border-color:#f3c6c6}
  .del-btn:active{transform:scale(0.93)}
  .game-score-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .team-block{text-align:center;flex:1}
  .team-block .tname{font-size:12px;color:#888}
  .team-block .tscore{font-size:28px;font-weight:700;color:#1a1a1a}
  .team-block.gwinner .tscore{color:#0F6E56}
  .vs{font-size:13px;color:#aaa}
  .overall-card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
  .overall-title{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:10px}
  .overall-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0f0f0}
  .overall-row:last-of-type{border-bottom:none}
  .overall-row .wins{font-size:12px;color:#888;margin-top:2px}
  .overall-champ{background:#E1F5EE;border-radius:8px;padding:10px;text-align:center;color:#0F6E56;font-size:13px;font-weight:600;margin-top:10px;border:1px solid #9FE1CB}
  .empty{font-size:13px;color:#aaa;padding:8px 0}
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
</style>
</head>
<body>
<div class="app">
  <h1>🃏 چهار برگ</h1>
  <p class="subtitle" id="game-subtitle">بازی ۱</p>

  <div class="tab-bar">
    <button class="tab active" id="tab-current" onclick="showTab('current')">بازی جاری</button>
    <button class="tab" id="tab-history" onclick="showTab('history')">تاریخچه بازی‌ها</button>
  </div>

  <div id="confirm-box" style="display:none" class="confirm-box">
    <p id="confirm-text"></p>
    <div class="confirm-btns">
      <button class="yes" id="confirm-yes">بله</button>
      <button onclick="cancelConfirm()">انصراف</button>
    </div>
  </div>

  <div id="view-current">
    <div id="winner-msg" style="display:none" class="winner-msg"></div>

    <div class="teams">
      <div class="team-card" id="card-0">
        <input class="team-name-input" id="name-0" value="تیم ما" oninput="renderGame()">
        <div class="total" id="total-0">0</div>
        <div class="total-label">امتیاز کل</div>
        <div class="inp-row">
          <button onclick="adj(0,-5)">−</button>
          <input class="set-inp" id="inp-0" type="number" value="0" step="5">
          <button onclick="adj(0,5)">+</button>
        </div>
        <div id="badge-0" style="display:none" class="winner-badge">🏆 برنده</div>
      </div>
      <div class="team-card" id="card-1">
        <input class="team-name-input" id="name-1" value="تیم حریف" oninput="renderGame()">
        <div class="total" id="total-1">0</div>
        <div class="total-label">امتیاز کل</div>
        <div class="inp-row">
          <button onclick="adj(1,-5)">−</button>
          <input class="set-inp" id="inp-1" type="number" value="0" step="5">
          <button onclick="adj(1,5)">+</button>
        </div>
        <div id="badge-1" style="display:none" class="winner-badge">🏆 برنده</div>
      </div>
    </div>

    <button class="add-btn" id="add-btn" onclick="addSet()">ثبت ست</button>
    <button class="save-btn" id="save-btn" style="display:none" onclick="askSaveGame()">💾 ذخیره نتیجه و شروع بازی جدید</button>

    <div class="controls">
      <button class="ctrl-btn" onclick="undoSet()">↩ برگشت</button>
      <button class="ctrl-btn danger" onclick="askReset()">↺ بازی جدید</button>
    </div>

    <div class="sec-title">تاریخچه ست‌ها</div>
    <div id="sets-list"></div>
  </div>

  <div id="view-history" style="display:none">
    <div id="overall-section"></div>
    <div class="sec-title" style="margin-bottom:8px">نتایج بازی‌ها</div>
    <div id="games-list"></div>
  </div>
</div>

<script>
const WIN=104;
const STORAGE_KEY='chaarBargState';
const state={scores:[0,0],sets:[],gameOver:false,gameNum:1,savedGames:[]};

function toFa(n){return String(n).replace(/\d/g,d=>'۰۱۲۳۴۵۶۷۸۹'[d]);}

function div(a,b){return ~~(a/b);}
function gregorianToJalali(gy,gm,gd){
  const g_d_m=[0,31,59,90,120,151,181,212,243,273,304,334];
  const gy2=(gm>2)?(gy+1):gy;
  let days=355666+(365*gy)+div(gy2+3,4)-div(gy2+99,100)+div(gy2+399,400)+gd+g_d_m[gm-1];
  let jy=-1595+(33*div(days,12053));
  days%=12053;
  jy+=4*div(days,1461);
  days%=1461;
  let jm,jd;
  if(days>365){jy+=div(days-1,365);days=(days-1)%365;}
  if(days<186){jm=1+div(days,31);jd=1+(days%31);}
  else{jm=7+div(days-186,30);jd=1+((days-186)%30);}
  return [jy,jm,jd];
}
const FA_MONTHS=['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
function nowJalaliStr(){
  const d=new Date();
  const [jy,jm,jd]=gregorianToJalali(d.getFullYear(),d.getMonth()+1,d.getDate());
  return `${toFa(jd)} ${FA_MONTHS[jm-1]} ${toFa(jy)}`;
}

function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify({
      scores:state.scores,sets:state.sets,gameOver:state.gameOver,
      gameNum:state.gameNum,savedGames:state.savedGames,
      names:[name(0),name(1)]
    }));
  }catch(e){console.error('saveState failed',e);}
}
function loadState(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return;
    const d=JSON.parse(raw);
    state.scores=d.scores||[0,0];
    state.sets=d.sets||[];
    state.gameOver=!!d.gameOver;
    state.gameNum=d.gameNum||1;
    state.savedGames=d.savedGames||[];
    if(d.names){
      document.getElementById('name-0').value=d.names[0]||'تیم ما';
      document.getElementById('name-1').value=d.names[1]||'تیم حریف';
    }
  }catch(e){console.error('loadState failed',e);}
}

async function fetchHistory(){
  try{
    const res=await fetch('/api/history');
    if(!res.ok)throw new Error('bad response');
    const games=await res.json();
    state.savedGames=games;
    state.gameNum=games.length+1;
  }catch(e){
    console.error('fetchHistory failed, using local cache',e);
  }
}

function askDeleteGame(index,label){
  showConfirm('نتیجه بازی '+label+' برای همیشه حذف بشه؟',()=>doDeleteGame(index));
}
async function doDeleteGame(index){
  cancelConfirm();
  try{
    const res=await fetch('/api/history?index='+encodeURIComponent(index),{method:'DELETE'});
    if(!res.ok)throw new Error('delete failed');
    state.savedGames=await res.json();
  }catch(e){
    console.error('doDeleteGame failed, removing locally only',e);
    state.savedGames.splice(index,1);
  }
  state.gameNum=state.savedGames.length+1;
  renderHistory();
}
function name(i){return document.getElementById('name-'+i).value.trim()||'تیم '+(i+1);}
function adj(i,d){
  const inp=document.getElementById('inp-'+i);
  inp.value=Math.max(0,(parseInt(inp.value)||0)+d);
}

function addSet(){
  if(state.gameOver)return;
  const v=[0,1].map(i=>Math.max(0,parseInt(document.getElementById('inp-'+i).value)||0));
  state.sets.push([...v]);
  state.scores[0]+=v[0];state.scores[1]+=v[1];
  document.getElementById('inp-0').value=0;
  document.getElementById('inp-1').value=0;
  if(state.scores[0]>=WIN||state.scores[1]>=WIN)state.gameOver=true;
  renderGame();
}

function undoSet(){
  if(!state.sets.length)return;
  const last=state.sets.pop();
  state.scores[0]-=last[0];state.scores[1]-=last[1];
  state.gameOver=false;
  renderGame();
}

function showConfirm(text,action){
  document.getElementById('confirm-text').textContent=text;
  document.getElementById('confirm-yes').onclick=action;
  document.getElementById('confirm-box').style.display='block';
}
function cancelConfirm(){document.getElementById('confirm-box').style.display='none';}

function askReset(){showConfirm('بازی جاری پاک بشه؟ تاریخچه ذخیره‌شده باقی میمونه.',doReset);}
function doReset(){
  state.scores=[0,0];state.sets=[];state.gameOver=false;
  document.getElementById('inp-0').value=0;
  document.getElementById('inp-1').value=0;
  cancelConfirm();renderGame();
}

function askSaveGame(){showConfirm('نتیجه ذخیره بشه و بازی جدید شروع بشه؟',doSaveGame);}
async function doSaveGame(){
  const wi=getWinIdx();
  const game={id:(crypto.randomUUID?crypto.randomUUID():Date.now()+'-'+Math.random().toString(36).slice(2)),num:state.gameNum,teams:[name(0),name(1)],scores:[...state.scores],winIdx:wi,date:nowJalaliStr()};
  const sb=document.getElementById('save-btn');
  sb.disabled=true;sb.textContent='در حال ذخیره...';
  try{
    const res=await fetch('/api/history',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(game)
    });
    if(!res.ok)throw new Error('save failed');
    state.savedGames=await res.json();
    state.gameNum=state.savedGames.length+1;
  }catch(e){
    console.error('doSaveGame: server save failed, keeping local copy only',e);
    state.savedGames.push(game);
    state.gameNum++;
  }
  sb.disabled=false;sb.textContent='💾 ذخیره نتیجه و شروع بازی جدید';
  state.scores=[0,0];state.sets=[];state.gameOver=false;
  document.getElementById('inp-0').value=0;
  document.getElementById('inp-1').value=0;
  cancelConfirm();renderGame();
}

function getWinIdx(){
  if(!state.gameOver)return -1;
  if(state.scores[0]>=WIN&&state.scores[1]>=WIN)return state.scores[0]>state.scores[1]?0:1;
  return state.scores[0]>=WIN?0:1;
}

function showTab(t){
  document.getElementById('view-current').style.display=t==='current'?'block':'none';
  document.getElementById('view-history').style.display=t==='history'?'block':'none';
  document.getElementById('tab-current').className='tab'+(t==='current'?' active':'');
  document.getElementById('tab-history').className='tab'+(t==='history'?' active':'');
  if(t==='history'){
    renderHistory();
    fetchHistory().then(renderHistory);
  }
}

function renderGame(){
  const wi=getWinIdx();
  [0,1].forEach(i=>{
    document.getElementById('total-'+i).textContent=state.scores[i];
    document.getElementById('card-'+i).className='team-card'+(wi===i?' winner':'');
    document.getElementById('badge-'+i).style.display=wi===i?'block':'none';
  });
  const wm=document.getElementById('winner-msg');
  const sb=document.getElementById('save-btn');
  if(wi>=0){
    wm.style.display='block';
    wm.textContent='🏆 '+name(wi)+' برنده بازی '+toFa(state.gameNum)+' شد!';
    document.getElementById('add-btn').disabled=true;
    sb.style.display='block';
  } else {
    wm.style.display='none';
    document.getElementById('add-btn').disabled=false;
    sb.style.display='none';
  }
  document.getElementById('game-subtitle').textContent='بازی '+toFa(state.gameNum);
  const list=document.getElementById('sets-list');
  if(!state.sets.length){list.innerHTML='<div class="empty">هنوز ستی ثبت نشده</div>';saveState();return;}
  let cum=[0,0];
  list.innerHTML=`<div class="round-row rounds-header"><span></span><span>${name(0)}</span><span>${name(1)}</span></div>`
    +state.sets.map((s,i)=>{
      cum[0]+=s[0];cum[1]+=s[1];
      return`<div class="round-row"><span class="rn">ست ${toFa(i+1)}</span><span>${s[0]}<br><span class="running">${cum[0]}</span></span><span>${s[1]}<br><span class="running">${cum[1]}</span></span></div>`;
    }).join('');
  saveState();
}

function renderHistory(){
  const games=state.savedGames;
  const glist=document.getElementById('games-list');
  const osec=document.getElementById('overall-section');
  if(!games.length){glist.innerHTML='<div class="empty">هنوز بازی ذخیره‌شده‌ای نیست</div>';osec.innerHTML='';return;}
  const totals={};
  games.forEach(g=>{
    [0,1].forEach(i=>{
      const n=g.teams[i];
      if(!totals[n])totals[n]={score:0,wins:0};
      totals[n].score+=g.scores[i];
      if(g.winIdx===i)totals[n].wins++;
    });
  });
  const sorted=Object.entries(totals).sort((a,b)=>b[1].score-a[1].score);
  const champ=sorted[0];
  osec.innerHTML=`<div class="overall-card">
    <div class="overall-title">🏅 جدول کلی</div>
    ${sorted.map(([n,d],idx)=>`<div class="overall-row">
      <div><div style="font-size:14px">${idx===0?'🥇':idx===1?'🥈':'🥉'} ${n}</div><div class="wins">${toFa(d.wins)} برد</div></div>
      <div style="font-size:24px;font-weight:700;color:${idx===0?'#0F6E56':'#1a1a1a'}">${d.score}</div>
    </div>`).join('')}
    <div class="overall-champ">🏆 ${champ[0]} با ${toFa(champ[1].score)} امتیاز در صدر جدوله</div>
  </div>`;
  glist.innerHTML=games.map((g,idx)=>`<div class="game-card">
    <div class="game-card-title-row">
      <div class="game-card-title">بازی ${toFa(g.num)}${g.date?' · '+g.date:''}</div>
      <button class="del-btn" onclick="askDeleteGame(${idx},'${toFa(g.num)}')" aria-label="حذف">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path></svg>
      </button>
    </div>
    <div class="game-score-row">
      <div class="team-block${g.winIdx===0?' gwinner':''}">
        <div class="tname">${g.teams[0]}${g.winIdx===0?' 🏆':''}</div>
        <div class="tscore">${g.scores[0]}</div>
      </div>
      <div class="vs">در برابر</div>
      <div class="team-block${g.winIdx===1?' gwinner':''}">
        <div class="tname">${g.teams[1]}${g.winIdx===1?' 🏆':''}</div>
        <div class="tscore">${g.scores[1]}</div>
      </div>
    </div>
  </div>`).join('');
}

loadState();
document.getElementById('inp-0').value=0;
document.getElementById('inp-1').value=0;
renderGame();
fetchHistory().then(renderGame);
</script>
</body>
</html>
